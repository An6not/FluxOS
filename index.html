<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxOS Connect 4 Random ID</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #007aff;
            --p1: #ff3b30;
            --p2: #ffcc00;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 { font-size: 20px; margin-bottom: 20px; font-weight: 500; color: #888; }

        .id-display {
            background: #1a1a1a;
            color: var(--accent);
            font-size: 32px;
            font-weight: 800;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            letter-spacing: 5px;
            border: 1px solid var(--accent);
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: #222; color: #ccc; }
        
        #board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 16px;
            margin-top: 15px;
        }

        .cell {
            background: #262626;
            aspect-ratio: 1/1;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .p1 { background: var(--p1); box-shadow: 0 0 15px var(--p1); transform: scale(0.9); }
        .p2 { background: var(--p2); box-shadow: 0 0 15px var(--p2); transform: scale(0.9); }

        .hidden { display: none !important; }
        .status-msg { margin-bottom: 10px; font-weight: 600; font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1>CONNECT 4 P2P</h1>
        
        <div id="main-actions">
            <button class="btn btn-main" onclick="startHost()">Создать новую игру</button>
            <div style="margin: 15px 0; color: #444">или</div>
            <input type="number" id="room-input" placeholder="Введите код друга">
            <button class="btn btn-sec" onclick="startJoin()">Войти по коду</button>
        </div>

        <div id="host-wait" class="hidden">
            <p style="margin-bottom: 10px">Твой код комнаты:</p>
            <div class="id-display" id="generated-id">------</div>
            <p style="color: #666; font-size: 14px">Скажи этот код другу</p>
            <button class="btn btn-sec" style="margin-top: 20px" onclick="location.reload()">Отмена</button>
        </div>
    </div>

    <div id="game" class="container hidden">
        <div class="status-msg" id="game-status">Ожидание...</div>
        <div id="board"></div>
        <button class="btn btn-sec" style="margin-top:20px" onclick="location.reload()">Выйти</button>
    </div>

    <script>
        let peer = null, conn = null;
        let board = [], isHost = false, myTurn = false;
        const ROWS = 6, COLS = 7;

        // Генерация случайного 6-значного числа
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function startHost() {
            const code = generateCode();
            isHost = true;
            initPeer('f4-' + code, code);
        }

        function startJoin() {
            const code = document.getElementById('room-input').value;
            if (code.length < 5) return alert("Введите корректный код!");
            isHost = false;
            initPeer(null, code);
        }

        function initPeer(customId, displayCode) {
            // Если мы хост, регистрируем ID, если клиент - получаем случайный от системы
            peer = customId ? new Peer(customId) : new Peer();

            peer.on('open', (id) => {
                if (isHost) {
                    document.getElementById('main-actions').classList.add('hidden');
                    document.getElementById('host-wait').classList.remove('hidden');
                    document.getElementById('generated-id').innerText = displayCode;
                } else {
                    connectTo('f4-' + displayCode);
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupEvents();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Если вдруг рандом совпал с кем-то, пробуем еще раз
                    if (isHost) startHost(); 
                } else {
                    alert("Ошибка: " + err.type);
                    location.reload();
                }
            });
        }

        function connectTo(targetId) {
            conn = peer.connect(targetId);
            setupEvents();
        }

        function setupEvents() {
            conn.on('open', () => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                initBoard();
            });

            conn.on('data', (data) => {
                if (data.type === 'move') {
                    applyMove(data.col, isHost ? 2 : 1);
                    myTurn = true;
                    updateUI();
                }
            });
        }

        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            myTurn = isHost;
            drawBoard();
            updateUI();
        }

        function drawBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[r][c] === 1) cell.classList.add('p1');
                    if (board[r][c] === 2) cell.classList.add('p2');
                    cell.onclick = () => makeMove(c);
                    b.appendChild(cell);
                }
            }
        }

        function makeMove(col) {
            if (!myTurn) return;
            const r = getRow(col);
            if (r === -1) return;

            board[r][col] = isHost ? 1 : 2;
            conn.send({ type: 'move', col: col });
            myTurn = false;
            
            drawBoard();
            if (checkWin(r, col, board[r][col])) {
                document.getElementById('game-status').innerText = "ТЫ ПОБЕДИЛ! 🎉";
                myTurn = false;
            } else {
                updateUI();
            }
        }

        function applyMove(col, p) {
            const r = getRow(col);
            board[r][col] = p;
            drawBoard();
            if (checkWin(r, col, p)) {
                document.getElementById('game-status').innerText = "ПРОТИВНИК ВЫИГРАЛ 💀";
                myTurn = false;
            }
        }

        function getRow(c) {
            for (let r = ROWS - 1; r >= 0; r--) if (board[r][c] === 0) return r;
            return -1;
        }

        function updateUI() {
            const st = document.getElementById('game-status');
            st.innerText = myTurn ? "ТВОЙ ХОД" : "ХОД ДРУГА...";
            st.style.color = myTurn ? "var(--p1)" : "#666";
        }

        function checkWin(r, c, p) {
            const d = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of d) {
                let ct = 1;
                for (let i=1; i<4; i++) {
                    let nr=r+dr*i, nc=c+dc*i;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===p) ct++; else break;
                }
                for (let i=1; i<4; i++) {
                    let nr=r-dr*i, nc=c-dc*i;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===p) ct++; else break;
                }
                if (ct >= 4) return true;
            }
            return false;
        }
    </script>
</body>
</html>
