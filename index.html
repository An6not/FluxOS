<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxOS P2P Multi-Engine FIX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --p1: #ef4444; --p2: #10b981; --p3: #f59e0b;
            --text: #f8fafc;
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius); }

        /* Lobby UI */
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 900; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass); color: #94a3b8; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .m-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .game-card { padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .game-card.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .game-card i { display: block; font-style: normal; font-size: 20px; margin-bottom: 5px; }
        .game-card span { font-size: 11px; font-weight: 600; text-transform: uppercase; }

        .conn-box { padding: 20px; text-align: center; margin-top: auto; }
        .my-id-text { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: 3px; margin: 10px 0; }
        input { width: 100%; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: #fff; text-align: center; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: var(--bg); }

        /* Game Board */
        .score-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .score-item { flex: 1; padding: 10px; border-radius: 12px; text-align: center; font-size: 12px; border-bottom: 4px solid transparent; }
        .score-item b { display: block; font-size: 18px; }

        .board { display: grid; gap: 5px; margin: 0 auto; width: 100%; max-width: 400px; }
        .cell { aspect-ratio: 1/1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; transition: 0.1s; }
        .cell.p1 { color: var(--p1); } .cell.p2 { color: var(--p2); } .cell.p3 { color: var(--p3); }
        .cell.coin { border-radius: 50%; border: 3px solid rgba(0,0,0,0.2); }
        .cell.coin.p1 { background: var(--p1); } .cell.coin.p2 { background: var(--p2); } .cell.coin.p3 { background: var(--p3); }
        .cell.fading { opacity: 0.3; filter: blur(1px); }

        .status-msg { padding: 15px; text-align: center; font-weight: 700; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-lobby" class="fade-in">
        <div class="header"><h1>FluxOS GameHub</h1></div>

        <div class="mode-selector glass">
            <button class="m-btn active" id="btn-p2" onclick="App.setLimit(2)">2 PLAYERS</button>
            <button class="m-btn" id="btn-p3" onclick="App.setLimit(3)">3 PLAYERS</button>
        </div>

        <div class="game-grid">
            <div class="game-card glass active" id="m-ttt" onclick="App.setMode('ttt')"><i>⭕</i><span>Крестики</span></div>
            <div class="game-card glass" id="m-ghost" onclick="App.setMode('ghost')"><i>👻</i><span>Призрак</span></div>
            <div class="game-card glass" id="m-c4" onclick="App.setMode('c4')"><i>🔴</i><span>7x6 C4</span></div>
            <div class="game-card glass" id="m-mem" onclick="App.setMode('mem')"><i>🧠</i><span>Память</span></div>
            <div class="game-card glass" id="m-rps" onclick="App.setMode('rps')"><i>✂️</i><span>К.Н.Б.</span></div>
            <div class="game-card glass" id="m-tap" onclick="App.setMode('tap')"><i>⚡</i><span>Tap War</span></div>
        </div>

        <div class="conn-box glass">
            <p style="font-size: 12px; color: #64748b;">ВАШ ID:</p>
            <div class="my-id-text" id="display-id">------</div>
            <input type="number" id="input-host-id" placeholder="ID ХОСТА" inputmode="numeric">
            <button class="btn btn-primary" onclick="Net.connect()">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <div id="scr-game" class="hidden">
        <div class="score-bar">
            <div class="score-item glass" style="border-color: var(--p1)">P1<b id="score-0">0</b></div>
            <div class="score-item glass" style="border-color: var(--p2)">P2<b id="score-1">0</b></div>
            <div id="box-p3" class="score-item glass hidden" style="border-color: var(--p3)">P3<b id="score-2">0</b></div>
        </div>

        <div id="status" class="status-msg glass">Ожидание игроков...</div>

        <div id="arena" style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <div id="board" class="board"></div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn glass" onclick="location.reload()" style="flex: 1;">ВЫХОД</button>
            <button id="btn-restart" class="btn btn-primary hidden" onclick="App.restart()" style="flex: 2;">ЕЩЕ РАЗ</button>
        </div>
    </div>
</div>

<script>
    /**
     * NETWORK CORE (FIXED RELAY)
     */
    const Net = {
        peer: null, conns: [], role: 'HOST', myIdx: 0,
        init() {
            const id = Math.floor(100000 + Math.random() * 900000).toString();
            this.peer = new Peer('flux-' + id);
            this.peer.on('open', () => document.getElementById('display-id').innerText = id);
            this.peer.on('connection', c => this.handleInbound(c));
        },
        connect() {
            const tid = document.getElementById('input-host-id').value;
            if(!tid) return;
            this.role = 'GUEST';
            const c = this.peer.connect('flux-' + tid);
            this.handleInbound(c);
        },
        handleInbound(c) {
            c.on('open', () => {
                if(this.role === 'HOST') {
                    if(this.conns.length >= 2) return c.close();
                    this.conns.push(c);
                    // Назначаем ID Гостю (1 или 2)
                    c.send({ type: 'ASSIGN_ID', idx: this.conns.length, limit: App.playerLimit, mode: App.mode });
                    App.checkLobby();
                }
                App.showUI();
            });
            c.on('data', data => Router.onData(data, c));
            c.on('close', () => location.reload());
        },
        broadcast(data) {
            this.conns.forEach(c => c.send(data));
        }
    };

    /**
     * ROUTER (STATE SYNC)
     */
    const Router = {
        onData(data, conn) {
            if(data.type === 'ASSIGN_ID') {
                Net.myIdx = data.idx;
                App.playerLimit = data.limit;
                App.mode = data.mode;
                App.updateUI();
            }
            if(data.type === 'START') {
                App.mode = data.mode;
                App.playerLimit = data.limit;
                App.start();
            }
            if(data.type === 'MOVE') {
                Games[App.mode].apply(data.idx, data.p);
                // Relay if Host
                if(Net.role === 'HOST') Net.broadcast(data);
            }
            if(data.type === 'SYNC_MEM') {
                Games.mem.deck = data.deck;
                Games.mem.render();
            }
            if(data.type === 'RESTART') App.start();
            if(data.type === 'WIN') {
                App.active = false;
                document.getElementById('status').innerText = data.msg;
                document.getElementById('btn-restart').classList.remove('hidden');
                if(Net.role === 'HOST') Net.broadcast(data);
            }
        }
    };

    /**
     * APP ENGINE
     */
    const App = {
        mode: 'ttt', playerLimit: 2, turn: 0, active: false,
        setLimit(n) {
            this.playerLimit = n;
            document.getElementById('btn-p2').classList.toggle('active', n === 2);
            document.getElementById('btn-p3').classList.toggle('active', n === 3);
        },
        setMode(m) {
            this.mode = m;
            document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
            document.getElementById('m-' + m).classList.add('active');
        },
        showUI() {
            document.getElementById('scr-lobby').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            this.updateUI();
        },
        updateUI() {
            document.getElementById('box-p3').classList.toggle('hidden', this.playerLimit < 3);
        },
        checkLobby() {
            if(Net.conns.length + 1 === this.playerLimit) {
                Net.broadcast({ type: 'START', mode: this.mode, limit: this.playerLimit });
                this.start();
            }
        },
        start() {
            this.active = true;
            this.turn = 0;
            document.getElementById('btn-restart').classList.add('hidden');
            Games[this.mode].init();
            this.updateStatus();
        },
        updateStatus() {
            const st = document.getElementById('status');
            const isMe = (Net.myIdx === this.turn);
            st.innerText = isMe ? "ВАШ ХОД!" : `ХОД ИГРОКА ${this.turn + 1}...`;
            st.style.color = isMe ? 'var(--accent)' : '#fff';
        },
        restart() { if(Net.role === 'HOST') { this.start(); Net.broadcast({ type: 'RESTART' }); } }
    };

    /**
     * GAMES LOGIC
     */
    const Games = {
        isMyTurn() { return App.active && Net.myIdx === App.turn; },

        // --- TTT (3x3 or 6x6) ---
        ttt: {
            grid: [], size: 3,
            init() {
                this.size = App.playerLimit === 3 ? 6 : 3;
                this.grid = Array(this.size * this.size).fill(null);
                const b = document.getElementById('board');
                b.style.gridTemplateColumns = `repeat(${this.size}, 1fr)`;
                b.innerHTML = '';
                for(let i=0; i<this.grid.length; i++) {
                    const c = document.createElement('div');
                    c.className = 'cell glass';
                    c.onclick = () => {
                        if(Games.isMyTurn() && !this.grid[i]) {
                            this.apply(i, Net.myIdx);
                            Net.role === 'HOST' ? Net.broadcast({type:'MOVE', idx:i, p:Net.myIdx}) : Net.peer.connections[Object.keys(Net.peer.connections)[0]][0].send({type:'MOVE', idx:i, p:Net.myIdx});
                        }
                    };
                    b.appendChild(c);
                }
            },
            apply(i, p) {
                this.grid[i] = p;
                const cells = document.getElementById('board').children;
                cells[i].innerText = ['X', 'O', '▲'][p];
                cells[i].classList.add('p' + (p+1));
                if(this.checkWin(p)) {
                    if(Net.role === 'HOST') Router.onData({type:'WIN', msg: `ИГРОК ${p+1} ВЫИГРАЛ!`});
                } else {
                    App.turn = (App.turn + 1) % App.playerLimit;
                    App.updateStatus();
                }
            },
            checkWin(p) {
                const s = this.size, target = App.playerLimit === 3 ? 4 : 3;
                for(let i=0; i<this.grid.length; i++) {
                    if(this.grid[i] !== p) continue;
                    for(let [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                        let count = 1;
                        for(let step=1; step<target; step++) {
                            let r = Math.floor(i/s) + dr*step, c = (i%s) + dc*step;
                            if(r>=0 && r<s && c>=0 && c<s && this.grid[r*s+c] === p) count++; else break;
                        }
                        if(count === target) return true;
                    }
                }
                return false;
            }
        },

        // --- GHOST ---
        ghost: {
            queues: [[], [], []],
            init() { Games.ttt.init.call(this); this.queues = [[], [], []]; },
            apply(i, p) {
                const cells = document.getElementById('board').children;
                this.queues[p].push(i);
                if(this.queues[p].length > 3) {
                    const old = this.queues[p].shift();
                    this.grid[old] = null;
                    cells[old].innerText = ''; cells[old].className = 'cell glass';
                }
                this.grid[i] = p;
                cells[i].innerText = ['X', 'O', '▲'][p];
                cells[i].classList.add('p' + (p+1));
                Array.from(cells).forEach(c => c.classList.remove('fading'));
                this.queues.forEach(q => { if(q.length === 3) cells[q[0]].classList.add('fading'); });

                if(Games.ttt.checkWin.call(this, p)) {
                    if(Net.role === 'HOST') Router.onData({type:'WIN', msg: `ПРИЗРАК ${p+1} ПОБЕДИЛ!`});
                } else {
                    App.turn = (App.turn + 1) % App.playerLimit;
                    App.updateStatus();
                }
            }
        },

        // --- CONNECT 4 (7x6) ---
        c4: {
            grid: [],
            init() {
                this.grid = Array(42).fill(null);
                const b = document.getElementById('board');
                b.style.gridTemplateColumns = `repeat(7, 1fr)`;
                b.innerHTML = '';
                for(let i=0; i<42; i++) {
                    const c = document.createElement('div');
                    c.className = 'cell glass coin';
                    c.onclick = () => {
                        if(!Games.isMyTurn()) return;
                        let col = i % 7;
                        for(let r=5; r>=0; r--) {
                            if(this.grid[r*7+col] === null) {
                                const targetIdx = r*7+col;
                                this.apply(targetIdx, Net.myIdx);
                                const pkt = {type:'MOVE', idx:targetIdx, p:Net.myIdx};
                                Net.role === 'HOST' ? Net.broadcast(pkt) : Net.peer.connections[Object.keys(Net.peer.connections)[0]][0].send(pkt);
                                break;
                            }
                        }
                    };
                    b.appendChild(c);
                }
            },
            apply(idx, p) {
                this.grid[idx] = p;
                document.getElementById('board').children[idx].classList.add('p' + (p+1));
                if(Games.ttt.checkWin.call({grid:this.grid, size:7}, p)) {
                    if(Net.role === 'HOST') Router.onData({type:'WIN', msg: `C4: ПОБЕДА P${p+1}`});
                } else {
                    App.turn = (App.turn + 1) % App.playerLimit;
                    App.updateStatus();
                }
            }
        },

        // --- MEMORY ---
        mem: {
            deck: [], flipped: [],
            init() {
                const b = document.getElementById('board');
                b.style.gridTemplateColumns = 'repeat(4, 1fr)';
                if(Net.role === 'HOST') {
                    const em = ['🔥','💎','🌀','💀','⚡','🍀','🍎','🍄'];
                    this.deck = [...em, ...em].sort(() => Math.random() - 0.5);
                    Net.broadcast({ type: 'SYNC_MEM', deck: this.deck });
                }
                this.render();
            },
            render() {
                const b = document.getElementById('board'); b.innerHTML = '';
                this.deck.forEach((v, i) => {
                    const c = document.createElement('div');
                    c.className = 'cell glass'; c.innerText = '❓';
                    c.onclick = () => {
                        if(Games.isMyTurn() && this.flipped.length < 2 && c.innerText === '❓') {
                            this.apply(i, Net.myIdx);
                            const pkt = {type:'MOVE', idx:i, p:Net.myIdx};
                            Net.role === 'HOST' ? Net.broadcast(pkt) : Net.peer.connections[Object.keys(Net.peer.connections)[0]][0].send(pkt);
                        }
                    };
                    b.appendChild(c);
                });
            },
            apply(i, p) {
                const cells = document.getElementById('board').children;
                cells[i].innerText = this.deck[i];
                this.flipped.push({idx:i, val:this.deck[i]});
                if(this.flipped.length === 2) {
                    if(this.flipped[0].val === this.flipped[1].val) {
                        this.flipped = [];
                    } else {
                        setTimeout(() => {
                            cells[this.flipped[0].idx].innerText = '❓';
                            cells[this.flipped[1].idx].innerText = '❓';
                            this.flipped = [];
                            App.turn = (App.turn + 1) % App.playerLimit;
                            App.updateStatus();
                        }, 1000);
                        return;
                    }
                }
                // Check Win
                if([...cells].every(c => c.innerText !== '❓')) {
                   if(Net.role === 'HOST') Router.onData({type:'WIN', msg: 'ПАМЯТЬ ОЧИЩЕНА!'});
                }
            }
        },

        // --- RPS ---
        rps: {
            votes: [],
            init() {
                this.votes = Array(App.playerLimit).fill(null);
                const b = document.getElementById('board'); b.style.gridTemplateColumns = '1fr';
                b.innerHTML = `
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                        <div class="cell glass" onclick="Games.rps.vote('🪨')">🪨</div>
                        <div class="cell glass" onclick="Games.rps.vote('📄')">📄</div>
                        <div class="cell glass" onclick="Games.rps.vote('✂️')">✂️</div>
                    </div>
                `;
            },
            vote(v) {
                if(this.votes[Net.myIdx]) return;
                this.apply(Net.myIdx, v);
                const pkt = {type:'MOVE', idx:Net.myIdx, p:v};
                Net.role === 'HOST' ? Net.broadcast(pkt) : Net.peer.connections[Object.keys(Net.peer.connections)[0]][0].send(pkt);
            },
            apply(i, v) {
                this.votes[i] = v;
                App.updateStatus(`P${i+1} ВЫБРАЛ...`);
                if(!this.votes.includes(null)) {
                    Router.onData({type:'WIN', msg: this.votes.join(' vs ')});
                }
            }
        },

        // --- TAP WAR ---
        tap: {
            scores: [0, 0, 0],
            init() {
                this.scores = [0, 0, 0];
                const b = document.getElementById('board'); b.style.gridTemplateColumns = '1fr';
                b.innerHTML = `<div class="cell glass" style="height:200px; font-size:40px;" onclick="Games.tap.hit()">TAP!!!</div>`;
            },
            hit() {
                this.apply(Net.myIdx, ++this.scores[Net.myIdx]);
                const pkt = {type:'MOVE', idx:this.scores[Net.myIdx], p:Net.myIdx};
                Net.role === 'HOST' ? Net.broadcast(pkt) : Net.peer.connections[Object.keys(Net.peer.connections)[0]][0].send(pkt);
            },
            apply(val, p) {
                this.scores[p] = val;
                document.getElementById('score-' + p).innerText = val;
                if(val >= 50) {
                    if(Net.role === 'HOST') Router.onData({type:'WIN', msg: `P${p+1} ВЫИГРАЛ ПО КЛИКАМ!`});
                }
            }
        }
    };

    Net.init();
</script>
</body>
</html>
