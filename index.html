<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mimic Protocol v2.0</title>
    <style>
        :root { --bg: #05070a; --panel: #12141d; --accent: #00f2ff; --host: #7000ff; --guest: #ff0055; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: var(--panel); width: 380px; padding: 25px; border-radius: 5px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,242,255,0.1); position: relative; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--accent); color: var(--accent); text-align: center; font-size: 1.2em; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; transition: 0.2s; margin-top: 5px; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-host { background: var(--host); color: #fff; }
        .btn-stop { background: var(--guest); color: #fff; }
        
        #chat-area { height: 250px; overflow-y: auto; border: 1px solid #222; margin: 10px 0; padding: 10px; display: flex; flex-direction: column; background: #080808; }
        .m { margin: 5px; padding: 8px; border-radius: 4px; font-size: 0.9em; max-width: 85%; }
        .m-host { align-self: flex-end; background: #1a1a3a; border-right: 3px solid var(--host); }
        .m-guest { align-self: flex-start; background: #2a1018; border-left: 3px solid var(--guest); }
        
        .cheat-panel { border: 1px dashed var(--host); padding: 10px; margin-top: 15px; background: #0d001a; }
        .status-bar { font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        .loading-bar { height: 4px; background: #222; width: 100%; position: relative; overflow: hidden; }
        .loading-bar::after { content: ""; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent); animation: load 2s infinite; }
        @keyframes load { 100% { left: 100%; } }
    </style>
</head>
<body>

    <div id="screen-auth" class="box">
        <div class="status-bar">System Authentication</div>
        <input type="text" id="nick" placeholder="NICKNAME">
        <button class="btn-blue" onclick="auth()">INITIALIZE</button>
    </div>

    <div id="screen-host-setup" class="box hidden">
        <div class="status-bar" style="color:var(--host)">Host Authority Detected</div>
        <h1 id="generated-code" style="text-align:center; color:var(--accent); font-size: 3em; margin: 10px 0;">00000</h1>
        <p style="font-size: 12px; text-align:center;">ПЕРЕДАЙТЕ ЭТОТ КОД ДРУГУ</p>
        <button class="btn-host" onclick="startSession()">ОТКРЫТЬ КАНАЛ</button>
    </div>

    <div id="screen-guest-setup" class="box hidden">
        <div class="status-bar">Connection Request</div>
        <input type="text" id="input-code" maxlength="5" placeholder="00000">
        <button class="btn-blue" onclick="tryConnect()">CONNECT TO HOST</button>
    </div>

    <div id="screen-wait" class="box hidden">
        <div class="status-bar">Searching for opponent...</div>
        <div class="loading-bar"></div>
        <p style="text-align:center; margin-top:20px;">ПРОТОКОЛ СИНХРОНИЗАЦИИ...</p>
    </div>

    <div id="screen-chat" class="box hidden">
        <div class="status-bar" id="chat-info">Session: Active</div>
        <div id="chat-area"></div>
        <input type="text" id="msg-input" placeholder="Type message...">
        
        <div id="annot-tools" class="hidden">
            <div class="cheat-panel">
                <div style="font-size:10px; color:var(--host); margin-bottom:5px;">MASTER CONTROLS</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button id="ai-toggle" onclick="toggleAI()" style="background:#222; color:white; font-size:10px;">MODE: HUMAN</button>
                    <button class="btn-host" onmousedown="playSound()" onmouseup="stopSound()" style="font-size:10px;">NOISE ATTACK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bc = new BroadcastChannel('game_channel');
        let myNick = "";
        let isAnnot = false;
        let myCode = "";
        let isAI = false;
        let noiseBuffer = null;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentOsc = null;

        // Генерация кода
        function generateCode() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        function auth() {
            myNick = document.getElementById('nick').value.trim();
            if (!myNick) return;

            if (myNick.toLowerCase() === 'annot') {
                isAnnot = true;
                myCode = generateCode();
                document.getElementById('generated-code').innerText = myCode;
                hideAll(); document.getElementById('screen-host-setup').classList.remove('hidden');
            } else {
                hideAll(); document.getElementById('screen-guest-setup').classList.remove('hidden');
            }
        }

        function startSession() {
            bc.postMessage({ type: 'LOBBY_CREATED', code: myCode, host: myNick });
            openChat();
        }

        function tryConnect() {
            const code = document.getElementById('input-code').value;
            hideAll(); document.getElementById('screen-wait').classList.remove('hidden');
            
            setTimeout(() => {
                bc.postMessage({ type: 'TRY_JOIN', code: code, guest: myNick });
            }, 2000);
        }

        function openChat() {
            hideAll();
            document.getElementById('screen-chat').classList.remove('hidden');
            if (isAnnot) document.getElementById('annot-tools').classList.remove('hidden');
        }

        // Логика звука (Генерация резкого шума)
        function playSound() {
            bc.postMessage({ type: 'SOUND_START' });
            _startLocalNoise();
        }

        function stopSound() {
            bc.postMessage({ type: 'SOUND_STOP' });
            _stopLocalNoise();
        }

        function _startLocalNoise() {
            if (currentOsc) return;
            currentOsc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            currentOsc.type = 'sawtooth'; // Очень резкий звук
            currentOsc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            currentOsc.connect(gain);
            gain.connect(audioCtx.destination);
            currentOsc.start();
        }

        function _stopLocalNoise() {
            if (currentOsc) {
                currentOsc.stop();
                currentOsc = null;
            }
        }

        // Сетевые сообщения
        bc.onmessage = (e) => {
            const data = e.data;

            if (data.type === 'TRY_JOIN' && isAnnot) {
                if (data.code === myCode) {
                    bc.postMessage({ type: 'JOIN_SUCCESS', code: myCode });
                    addMsg("Система", `Игрок ${data.guest} подключился`, 'sys');
                }
            }

            if (data.type === 'JOIN_SUCCESS' && !isAnnot) {
                openChat();
                addMsg("Система", "Вы подключены к " + myCode, 'sys');
            }

            if (data.type === 'MSG') {
                addMsg(data.user, data.text, data.role);
            }

            if (data.type === 'SOUND_START') _startLocalNoise();
            if (data.type === 'SOUND_STOP') _stopLocalNoise();
        };

        function addMsg(user, text, role) {
            const area = document.getElementById('chat-area');
            const d = document.createElement('div');
            d.className = `m ${role === 'host' ? 'm-host' : 'm-guest'}`;
            d.innerHTML = `<strong>${user}:</strong> ${text}`;
            area.appendChild(d);
            area.scrollTop = area.scrollHeight;
        }

        document.getElementById('msg-input').onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value;
                const role = isAnnot ? 'host' : 'guest';
                bc.postMessage({ type: 'MSG', text: text, user: myNick, role: role });
                addMsg(myNick, text, role);
                e.target.value = "";
            }
        };

        function toggleAI() {
            isAI = !isAI;
            const btn = document.getElementById('ai-toggle');
            btn.innerText = isAI ? "MODE: AI CLONE" : "MODE: HUMAN";
            btn.style.color = isAI ? "var(--guest)" : "white";
        }

        function hideAll() {
            document.querySelectorAll('.box').forEach(b => b.classList.add('hidden'));
        }
    </script>
</body>
</html>
