<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxOS Gaming Hub v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #050508;
            --card: #12121a;
            --accent: #007aff;
            --p1: #ff3b30;
            --p2: #ffcc00;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top, #1a1a2e 0%, #050508 100%);
        }

        .container {
            width: 95%;
            max-width: 400px;
            background: var(--card);
            padding: 20px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        h1 { font-size: 22px; font-weight: 800; margin-bottom: 20px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #333;
            background: #000;
            color: var(--accent);
            font-size: 20px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #game-status { font-size: 18px; font-weight: 600; margin-bottom: 15px; height: 24px; }

        /* Сетка для 4 в ряд (7x6) */
        .board-7-6 {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: #1c1c26;
            padding: 10px;
            border-radius: 18px;
        }

        /* Сетка для Крестиков-ноликов (3x3) */
        .board-3-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #1c1c26;
            padding: 15px;
            border-radius: 18px;
        }

        .cell {
            background: #2a2a35;
            aspect-ratio: 1/1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: spawn 0.4s ease;
        }

        @keyframes spawn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .cell-square { border-radius: 12px; font-size: 48px; }

        /* Цвета игроков */
        .p1 { background: var(--p1); color: white; box-shadow: 0 0 15px var(--p1); }
        .p2 { background: var(--p2); color: black; box-shadow: 0 0 15px var(--p2); }

        .hidden { display: none !important; }
        .id-text { color: var(--accent); font-size: 32px; font-weight: 800; margin: 10px 0; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container">
        <h1>Flux Gaming Hub</h1>
        <div id="init-btns">
            <button class="btn btn-main" onclick="initLobby(true)">Создать комнату</button>
            <input type="number" id="join-code" placeholder="000000">
            <button class="btn btn-sec" onclick="initLobby(false)">Войти к другу</button>
        </div>
        <div id="waiting" class="hidden">
            <p>Ваш секретный код:</p>
            <div class="id-text" id="display-code">------</div>
            <p style="color: #555; font-size: 14px;">Скажи его второму игроку</p>
        </div>
    </div>

    <div id="mode-screen" class="container hidden">
        <h1>Выбери режим</h1>
        <button class="btn btn-main" onclick="sendStart('7-6')">4 В РЯД (7x6)</button>
        <button class="btn btn-sec" onclick="sendStart('3-3')">КРЕСТИКИ-НОЛИКИ (3x3)</button>
    </div>

    <div id="game-screen" class="container hidden">
        <div id="game-status">Ожидание...</div>
        <div id="board-grid"></div>
        <div id="reset-area" class="hidden">
            <button class="btn btn-main" style="margin-top:20px" onclick="requestRestart()">Реванш</button>
            <button class="btn btn-sec" onclick="location.reload()">В меню</button>
        </div>
    </div>

    <script>
        let peer, conn;
        let isHost = false, myTurn = false, currentGame = '7-6';
        let board = [], gameOver = false;

        function initLobby(host) {
            isHost = host;
            const code = isHost ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('join-code').value;
            if (!isHost && code.length < 5) return alert("Введите код!");

            peer = isHost ? new Peer('flux-' + code) : new Peer();

            peer.on('open', () => {
                if(isHost) {
                    document.getElementById('init-btns').classList.add('hidden');
                    document.getElementById('waiting').classList.remove('hidden');
                    document.getElementById('display-code').innerText = code;
                } else {
                    connectToPlayer('flux-' + code);
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                bindEvents();
            });

            peer.on('error', (e) => { alert("Ошибка сети. Попробуйте другой код."); location.reload(); });
        }

        function connectToPlayer(id) {
            conn = peer.connect(id);
            bindEvents();
        }

        function bindEvents() {
            conn.on('open', () => {
                document.getElementById('setup-screen').classList.add('hidden');
                if(isHost) document.getElementById('mode-screen').classList.remove('hidden');
            });

            conn.on('data', (data) => {
                if(data.type === 'start') {
                    currentGame = data.mode;
                    beginGame(false);
                } else if(data.type === 'move') {
                    executeMove(data.r, data.c, isHost ? 2 : 1);
                } else if(data.type === 'restart') {
                    beginGame(isHost);
                }
            });
        }

        function sendStart(mode) {
            currentGame = mode;
            conn.send({type: 'start', mode: mode});
            beginGame(true);
        }

        function beginGame(first) {
            document.getElementById('mode-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('reset-area').classList.add('hidden');
            
            const rows = currentGame === '7-6' ? 6 : 3;
            const cols = currentGame === '7-6' ? 7 : 3;
            board = Array(rows).fill().map(() => Array(cols).fill(0));
            
            gameOver = false;
            myTurn = first;
            renderGrid();
            refreshStatus();
        }

        function renderGrid() {
            const grid = document.getElementById('board-grid');
            grid.className = currentGame === '7-6' ? 'board-7-6' : 'board-3-3';
            grid.innerHTML = '';

            board.forEach((row, r) => {
                row.forEach((cellVal, c) => {
                    const el = document.createElement('div');
                    el.className = 'cell';
                    if(currentGame === '3-3') el.classList.add('cell-square');
                    
                    if(cellVal === 1) { el.classList.add('p1'); el.innerText = currentGame === '3-3' ? '✕' : ''; }
                    if(cellVal === 2) { el.classList.add('p2'); el.innerText = currentGame === '3-3' ? '◯' : ''; }
                    
                    el.onclick = () => userClick(r, c);
                    grid.appendChild(el);
                });
            });
        }

        function userClick(r, c) {
            if(!myTurn || gameOver || board[r][c] !== 0) return;

            // Гравитация для 4 в ряд
            if(currentGame === '7-6') {
                let foundRow = -1;
                for(let i=5; i>=0; i--) {
                    if(board[i][c] === 0) { foundRow = i; break; }
                }
                if(foundRow === -1) return;
                r = foundRow;
            }

            executeMove(r, c, isHost ? 1 : 2);
            conn.send({type: 'move', r: r, c: c});
        }

        function executeMove(r, c, p) {
            board[r][c] = p;
            renderGrid();
            
            if(checkWin(r, c, p)) {
                gameOver = true;
                document.getElementById('game-status').innerText = (p === (isHost ? 1 : 2)) ? "ТЫ ВЫИГРАЛ! 🎉" : "ДРУГ ВЫИГРАЛ! 💀";
                document.getElementById('reset-area').classList.remove('hidden');
            } else if(board.flat().every(v => v !== 0)) {
                document.getElementById('game-status').innerText = "НИЧЬЯ! 🤝";
                document.getElementById('reset-area').classList.remove('hidden');
            } else {
                myTurn = !myTurn;
                refreshStatus();
            }
        }

        function refreshStatus() {
            const s = document.getElementById('game-status');
            s.innerText = myTurn ? "ТВОЙ ХОД" : "ХОД ДРУГА...";
            s.style.color = myTurn ? "var(--p2)" : "#555";
        }

        function requestRestart() {
            conn.send({type: 'restart'});
            beginGame(isHost);
        }

        function checkWin(r, c, p) {
            const winNeeded = currentGame === '7-6' ? 4 : 3;
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            
            for(let [dr, dc] of directions) {
                let count = 1;
                // Вперед
                for(let i=1; i<winNeeded; i++) {
                    let nr=r+dr*i, nc=c+dc*i;
                    if(nr>=0 && nr<board.length && nc>=0 && nc<board[0].length && board[nr][nc]===p) count++; else break;
                }
                // Назад
                for(let i=1; i<winNeeded; i++) {
                    let nr=r-dr*i, nc=c-dc*i;
                    if(nr>=0 && nr<board.length && nc>=0 && nc<board[0].length && board[nr][nc]===p) count++; else break;
                }
                if(count >= winNeeded) return true;
            }
            return false;
        }
    </script>
</body>
</html>
