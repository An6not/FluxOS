<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Угадай число: Мультиплеер</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --primary-color: #00ff88;
            --secondary-color: #ff0055;
            --panel-bg: #1e1e1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .screen.active {
            display: flex;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 2px solid #333;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: var(--primary-color);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            transition: transform 0.1s, background 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            box-shadow: none;
        }

        #status {
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            color: #aaa;
        }

        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #hints-panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        #hints-panel p {
            margin: 5px 0;
            font-size: 16px;
        }

        #history {
            flex: 1;
            overflow-y: auto;
            background: var(--panel-bg);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px;
            border-radius: 8px;
            background: #2a2a2a;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .history-item.my-guess { border-left: 4px solid var(--primary-color); }
        .history-item.enemy-guess { border-left: 4px solid var(--secondary-color); }

        .controls {
            display: flex;
            gap: 10px;
        }

        .controls input {
            margin: 0;
            flex: 2;
        }

        .controls button {
            margin: 0;
            flex: 1;
        }

        /* Админ панель (ESP) */
        #admin-panel {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 0, 85, 0.9);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 15px;
            z-index: 9999;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.8);
            backdrop-filter: blur(5px);
        }

        #admin-panel h3 {
            margin: 0 0 10px 0;
            color: white;
            text-align: center;
        }

        #admin-panel p {
            margin: 5px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="admin-panel">
        <h3>⚡ ESP ADMIN PANEL ⚡</h3>
        <p>Загаданное число: <span id="esp-target" style="color: #00ff88; font-size: 20px;">----</span></p>
        <p>Статус: <span style="color: #00ff88;">Невидимо для противника</span></p>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background: white; color: black; padding: 5px; margin-top: 10px;">Скрыть</button>
    </div>

    <div id="login-screen" class="screen active">
        <h1>Угадай Число</h1>
        <input type="text" id="username" placeholder="Введи свой ник" maxlength="15">
        
        <div style="margin-top: 30px;">
            <button id="btn-host">Создать игру (Хост)</button>
            <div style="text-align: center; margin: 15px 0;">ИЛИ</div>
            <input type="text" id="join-id" placeholder="Введи ID игры друга">
            <button id="btn-join" class="secondary">Присоединиться</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="game-screen" class="screen">
        <h1>Игра началась!</h1>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
            <span id="player-names" style="color: #aaa;">Вы vs Противник</span>
        </div>

        <div id="hints-panel">
            <p>Диапазон поиска:</p>
            <p style="color: var(--primary-color); font-weight: bold; font-size: 20px;">
                <span id="min-hint">1000</span> — <span id="max-hint">9999</span>
            </p>
            <p id="last-feedback" style="font-size: 14px; color: #aaa;">Введите ваше первое число</p>
        </div>

        <div id="history">
            </div>

        <div class="controls">
            <input type="text" id="guess-input" placeholder="4 цифры или код" autocomplete="off">
            <button id="btn-guess">Ввод</button>
        </div>
    </div>
</div>

<script>
    // Инициализация переменных
    let peer = null;
    let conn = null;
    let myName = "";
    let enemyName = "Противник";
    let isHost = false;
    
    // Игровые переменные
    let targetNumber = 0;
    let minPossible = 1000;
    let maxPossible = 9999;
    let gameActive = false;
    let isAdminUnlocked = false;

    // Элементы UI
    const loginScreen = document.getElementById('login-screen');
    const gameScreen = document.getElementById('game-screen');
    const statusDiv = document.getElementById('status');
    const historyDiv = document.getElementById('history');
    const minHintSpan = document.getElementById('min-hint');
    const maxHintSpan = document.getElementById('max-hint');
    const lastFeedback = document.getElementById('last-feedback');
    const guessInput = document.getElementById('guess-input');

    // Функция генерации случайного 4-значного числа
    function generateTarget() {
        return Math.floor(1000 + Math.random() * 9000); // 1000 - 9999
    }

    // Обновление UI лобби
    function setStatus(msg) {
        statusDiv.innerText = msg;
    }

    // Инициализация соединения как Хост
    document.getElementById('btn-host').addEventListener('click', () => {
        myName = document.getElementById('username').value.trim() || "Игрок 1";
        setStatus("Создание сервера...");
        
        peer = new Peer(); // Генерируем случайный ID

        peer.on('open', (id) => {
            setStatus(`Твой ID игры: ${id}\nОтправь его другу!`);
            // Копирование ID при клике на статус для удобства
            statusDiv.style.cursor = "pointer";
            statusDiv.onclick = () => {
                navigator.clipboard.writeText(id);
                alert("ID скопирован в буфер обмена!");
            };
        });

        peer.on('connection', (connection) => {
            if (conn) {
                connection.close(); // Разрешаем только 1 подключение
                return;
            }
            conn = connection;
            isHost = true;
            setupConnection();
        });

        peer.on('error', (err) => {
            setStatus("Ошибка: " + err.message);
        });
    });

    // Инициализация соединения как Клиент
    document.getElementById('btn-join').addEventListener('click', () => {
        myName = document.getElementById('username').value.trim() || "Игрок 2";
        const hostId = document.getElementById('join-id').value.trim();
        
        if (!hostId) {
            setStatus("Введите ID игры!");
            return;
        }

        setStatus("Подключение...");
        peer = new Peer();

        peer.on('open', () => {
            conn = peer.connect(hostId);
            isHost = false;
            setupConnection();
        });

        peer.on('error', (err) => {
            setStatus("Ошибка подключения: " + err.message);
        });
    });

    // Настройка обработчиков данных после установки P2P соединения
    function setupConnection() {
        conn.on('open', () => {
            setStatus("Соединено! Запуск игры...");
            
            // Обмен именами
            conn.send({ type: 'init', name: myName });

            if (isHost) {
                // Хост генерирует число и отправляет клиенту начало игры
                targetNumber = generateTarget();
                setTimeout(() => {
                    conn.send({ type: 'start', target: targetNumber });
                    startGame();
                }, 500);
            }
        });

        conn.on('data', (data) => {
            if (data.type === 'init') {
                enemyName = data.name;
                document.getElementById('player-names').innerText = `${myName} vs ${enemyName}`;
            } 
            else if (data.type === 'start') {
                targetNumber = data.target;
                startGame();
            }
            else if (data.type === 'guess') {
                processEnemyGuess(data.guess, data.name);
            }
        });

        conn.on('close', () => {
            alert("Противник отключился.");
            location.reload();
        });
    }

    // Переход на экран игры и сброс состояния
    function startGame() {
        loginScreen.classList.remove('active');
        gameScreen.classList.active = true;
        gameScreen.style.display = 'flex';
        gameActive = true;
        
        // Сброс UI
        historyDiv.innerHTML = '';
        minPossible = 1000;
        maxPossible = 9999;
        updateHints();
        lastFeedback.innerText = "Игра началась! Вводите число.";
        
        // Если это админ - обновляем ESP
        if (myName === 'an6not') {
            document.getElementById('esp-target').innerText = targetNumber;
        }
    }

    // Обновление цифр диапазона на экране
    function updateHints() {
        minHintSpan.innerText = minPossible;
        maxHintSpan.innerText = maxPossible;
    }

    // Обработка кнопки ввода
    document.getElementById('btn-guess').addEventListener('click', handleMyInput);
    guessInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleMyInput();
    });

    function handleMyInput() {
        if (!gameActive) return;
        
        const inputVal = guessInput.value.trim();
        guessInput.value = '';

        // ПРОВЕРКА НА СЕКРЕТНУЮ ПАНЕЛЬ
        if (myName === 'an6not' && inputVal === '//pass:admin') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('esp-target').innerText = targetNumber;
            return; // Не отправляем это как игровой ход
        }

        // Парсинг числа
        const guess = parseInt(inputVal, 10);
        
        if (isNaN(guess) || guess < 1000 || guess > 9999) {
            lastFeedback.innerText = "Пожалуйста, введите 4-значное число (1000-9999).";
            lastFeedback.style.color = "var(--secondary-color)";
            return;
        }

        // Отправляем противнику
        conn.send({ type: 'guess', guess: guess, name: myName });
        
        // Обрабатываем локально
        processMyGuess(guess);
    }

    function processMyGuess(guess) {
        let resultText = "";
        let isWin = false;

        if (guess === targetNumber) {
            resultText = "ТОЧНО В ЦЕЛЬ!";
            isWin = true;
        } else if (guess < targetNumber) {
            resultText = "Мое число БОЛЬШЕ";
            if (guess >= minPossible) minPossible = guess + 1;
        } else {
            resultText = "Мое число МЕНЬШЕ";
            if (guess <= maxPossible) maxPossible = guess - 1;
        }

        addHistoryItem(myName, guess, resultText, 'my-guess');
        updateHints();
        
        lastFeedback.innerText = `Вы ввели ${guess}: ${resultText}`;
        lastFeedback.style.color = "var(--primary-color)";

        if (isWin) {
            endGame(myName);
        }
    }

    function processEnemyGuess(guess, eName) {
        let resultText = "";
        let isWin = false;

        if (guess === targetNumber) {
            resultText = "УГАДАЛ!";
            isWin = true;
        } else if (guess < targetNumber) {
            resultText = "Больше";
            if (guess >= minPossible) minPossible = guess + 1;
        } else {
            resultText = "Меньше";
            if (guess <= maxPossible) maxPossible = guess - 1;
        }

        addHistoryItem(eName, guess, resultText, 'enemy-guess');
        updateHints();
        
        lastFeedback.innerText = `Противник ввел ${guess}: ${resultText}`;
        lastFeedback.style.color = "var(--secondary-color)";

        if (isWin) {
            endGame(eName);
        }
    }

    // Добавление лога в историю
    function addHistoryItem(player, guess, result, className) {
        const div = document.createElement('div');
        div.className = `history-item ${className}`;
        div.innerHTML = `<span><b>${player}:</b> ${guess}</span> <span>${result}</span>`;
        historyDiv.prepend(div); // Добавляем наверх
    }

    // Завершение игры и анимации
    function endGame(winnerName) {
        gameActive = false;
        lastFeedback.innerText = `ИГРА ОКОНЧЕНА! Победитель: ${winnerName}. Число: ${targetNumber}`;
        lastFeedback.style.color = "#fff";
        lastFeedback.style.fontWeight = "bold";
        guessInput.disabled = true;
        document.getElementById('btn-guess').disabled = true;

        if (winnerName === myName) {
            triggerWinAnimation();
        }
    }

    // Эффект конфетти при победе
    function triggerWinAnimation() {
        const duration = 3 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            const particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }
</script>

</body>
</html>
