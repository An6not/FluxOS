<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>WebCraft Ultra: Survival P2P</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="vfx-layer">
        <div class="vignette"></div>
        <div id="damage-overlay"></div>
    </div>

    <div id="main-menu">
        <div class="menu-background">
            </div>
        
        <div class="menu-ui">
            <header>
                <h1 class="glitch-text" data-text="WEBCRAFT">WEBCRAFT</h1>
                <span class="version-tag">ULTRA SURVIVAL v2.5</span>
            </header>

            <div class="main-options">
                <div class="user-profile">
                    <input type="text" id="nickname" placeholder="Введите имя..." maxlength="15">
                    <div class="skin-preview" id="player-preview">
                        </div>
                </div>

                <div class="connection-hub">
                    <div class="hub-card" id="host-card">
                        <h3>ХОСТ МИРА</h3>
                        <p>Ваш ID: <span id="my-peer-id">----</span></p>
                        <button class="btn-main" onclick="game.initHost()">СОЗДАТЬ СЕРВЕР</button>
                    </div>

                    <div class="hub-divider"></div>

                    <div class="hub-card" id="join-card">
                        <h3>ПОДКЛЮЧЕНИЕ</h3>
                        <input type="text" id="join-id" placeholder="ID ХОСТА (5 цифр)">
                        <button class="btn-main join-btn" onclick="game.initClient()">ВОЙТИ В МИР</button>
                    </div>
                </div>
            </div>

            <div id="menu-logs">
                <div class="log-entry">Система готова к генерации...</div>
            </div>
        </div>
    </div>

    <div id="game-hud" style="display: none;">
        
        <div class="top-bar">
            <div class="ping-indicator">
                <div class="signal-bars">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </div>
                <span id="ping-val">0 ms</span>
            </div>
            <div id="online-counter">Игроков: 1</div>
        </div>

        <div class="survival-status">
            <div id="health-container" class="status-row">
                </div>
            <div id="hunger-container" class="status-row">
                </div>
        </div>

        <div id="reticle">
            <div class="dot"></div>
            <svg class="reticle-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" stroke="white" stroke-width="2" fill="none" />
            </svg>
        </div>

        <div id="toast-notifications"></div>

        <div class="bottom-ui">
            <div id="hotbar-wrapper">
                <div class="hotbar-selector" id="selector"></div>
                <div class="hotbar-slots">
                    <div class="slot" data-slot="0"><div class="item-count"></div></div>
                    <div class="slot" data-slot="1"></div>
                    <div class="slot" data-slot="2"></div>
                    <div class="slot" data-slot="3"></div>
                    <div class="slot" data-slot="4"></div>
                    <div class="slot" data-slot="5"></div>
                    <div class="slot" data-slot="6"></div>
                    <div class="slot" data-slot="7"></div>
                    <div class="slot" data-slot="8"></div>
                </div>
            </div>
        </div>

        <div id="touch-controls">
            <div id="joystick-container">
                <div id="joystick-outer">
                    <div id="joystick-inner"></div>
                </div>
            </div>

            <div class="action-buttons">
                <div id="btn-jump" class="t-btn"><span>JUMP</span></div>
                <div class="dual-actions">
                    <div id="btn-attack" class="t-btn red"><span>HIT</span></div>
                    <div id="btn-build" class="t-btn green"><span>USE</span></div>
                </div>
            </div>

            <div id="btn-inventory" class="t-btn square"><span>INV</span></div>
        </div>
    </div>

    <div id="webgl-output"></div>

    <script>
        // Инициализация глобального пространства имен
        const WebCraft = {
            version: "2.5.0",
            settings: {
                chunkSize: 16,
                renderDistance: 4,
                gravity: -0.012,
                // Продолжение объекта WebCraft.settings
                tickRate: 60,
                maxPlayers: 8,
                airResistance: 0.98,
                playerHeight: 1.8,
                reachDistance: 5,
            },
            
            // Состояние игрока (проработка выживания)
            state: {
                hp: 20,         // 20 единиц = 10 сердец
                hunger: 20,     // 20 единиц = 10 окорочков
                isDead: false,
                inventory: new Array(9).fill(null),
                activeSlot: 0,
                isMenuOpen: true
            },

            // Инициализация HUD (Сердца и Голод)
            ui: {
                initSurvivalBars() {
                    const healthCont = document.getElementById('health-container');
                    const hungerCont = document.getElementById('hunger-container');
                    
                    healthCont.innerHTML = '';
                    hungerCont.innerHTML = '';

                    // Генерация 10 сердец (каждое — 2 HP)
                    for (let i = 0; i < 10; i++) {
                        const heart = document.createElement('div');
                        heart.className = 'heart full';
                        heart.id = `heart-${i}`;
                        healthCont.appendChild(heart);
                    }

                    // Генерация 10 единиц еды (каждая — 2 ед.)
                    for (let i = 0; i < 10; i++) {
                        const food = document.createElement('div');
                        food.className = 'food full';
                        food.id = `food-${i}`;
                        hungerCont.appendChild(food);
                    }
                },

                updateHP(value) {
                    this.state.hp = Math.max(0, Math.min(20, value));
                    for (let i = 0; i < 10; i++) {
                        const heart = document.getElementById(`heart-${i}`);
                        const heartVal = i * 2 + 2;
                        if (this.state.hp >= heartVal) {
                            heart.className = 'heart full';
                        } else if (this.state.hp >= heartVal - 1) {
                            heart.className = 'heart half';
                        } else {
                            heart.className = 'heart empty';
                        }
                    }
                    if (this.state.hp <= 0) WebCraft.core.die();
                },

                showGame() {
                    gsap.to("#main-menu", { opacity: 0, duration: 0.8, onComplete: () => {
                        document.getElementById('main-menu').style.display = 'none';
                        document.getElementById('game-hud').style.display = 'block';
                        WebCraft.state.isMenuOpen = false;
                        // Запрос захвата указателя для управления камерой
                        document.body.requestPointerLock();
                    }});
                }
            },

            // Сетевой модуль (PeerJS интеграция)
            network: {
                peer: null,
                conn: null,
                id: null,

                init(customId) {
                    const finalId = customId || Math.floor(10000 + Math.random() * 90000).toString();
                    this.peer = new Peer(finalId, {
                        debug: 2,
                        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
                    });

                    this.peer.on('open', (id) => {
                        this.id = id;
                        document.getElementById('my-peer-id').innerText = id;
                        console.log('Network: Connected with ID ' + id);
                    });

                    this.peer.on('error', (err) => {
                        document.getElementById('menu-logs').innerHTML += `<div class="log-entry error">${err.type}</div>`;
                    });

                    // Ожидание входящих подключений (для Хоста)
                    this.peer.on('connection', (conn) => {
                        this.handleIncomingConnection(conn);
                    });
                },

                handleIncomingConnection(conn) {
                    this.conn = conn;
                    conn.on('data', (data) => {
                        // Обработка пакетов (позиция, блоки, чат)
                        WebCraft.core.processPacket(data);
                    });
                                        // Продолжение WebCraft.network.handleIncomingConnection
                    conn.on('open', () => {
                        console.log('Network: Peer connected!');
                        this.sendPacket({ type: 'handshake', nick: document.getElementById('nickname').value });
                        WebCraft.ui.showGame();
                    });
                },

                sendPacket(data) {
                    if (this.conn && this.conn.open) {
                        this.conn.send(data);
                    }
                },

                broadcast(data) {
                    // Метод для Хоста: разослать всем подключенным
                    connections.forEach(c => {
                        if (c.open) c.send(data);
                    });
                }
            },

            // ЯДРО ДВИЖКА (Управление состояниями)
            core: {
                init() {
                    console.log("Core: Starting Ultra Engine...");
                    WebCraft.ui.initSurvivalBars();
                    
                    // Слушатель для блокировки курсора (Pointer Lock)
                    document.addEventListener('pointerlockchange', () => {
                        const isLocked = document.pointerLockElement === document.body;
                        WebCraft.state.isMenuOpen = !isLocked;
                        // Если меню открыто — показываем курсор, если нет — прячем
                    });
                },

                processPacket(packet) {
                    switch(packet.type) {
                        case 'pos':
                            // Обновление позиции другого игрока (будет в main.js)
                            if (window.updateRemotePlayer) window.updateRemotePlayer(packet);
                            break;
                        case 'block':
                            // Синхронизация разрушения/установки блоков
                            if (window.world) window.world.setBlock(packet.x, packet.y, packet.z, packet.id, false);
                            break;
                        case 'chat':
                            console.log(`[Chat] ${packet.nick}: ${packet.msg}`);
                            break;
                    }
                },

                die() {
                    WebCraft.state.isDead = true;
                    document.getElementById('toast-notifications').innerHTML = `
                        <div class="death-screen">
                            <h1>ВЫ УМЕРЛИ</h1>
                            <button onclick="location.reload()">ВОЗРОДИТЬСЯ</button>
                        </div>
                    `;
                }
            }
        };

        // ФУНКЦИИ ГЛОБАЛЬНОГО ВЫЗОВА (Кнопки меню)
        function startGame(mode) {
            const nick = document.getElementById('nickname').value || "Steve";
            const hostId = document.getElementById('host-id').value;
            const joinId = document.getElementById('join-id').value;

            if (mode === 'host') {
                WebCraft.network.init(hostId);
                // Инициализация мира как хост
                window.initGameEngine(true); 
            } else {
                WebCraft.network.init();
                setTimeout(() => {
                    const conn = WebCraft.network.peer.connect(joinId);
                    WebCraft.network.handleIncomingConnection(conn);
                }, 1000);
                window.initGameEngine(false);
            }
            WebCraft.ui.showGame();
        }

        // Инициализация при загрузке
        window.onload = () => {
            WebCraft.core.init();
            
            // Плавное появление меню через GSAP
            gsap.from(".menu-content", { y: 50, opacity: 0, duration: 1, ease: "power4.out" });
        };
    </script>
</body>
</html>
