<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxOS P2P Pro FIX</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --accent: #007aff;
            --p1: #ff3b30; --p2: #34c759; --p3: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; user-select: none; outline: none; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        .app { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; position: relative; }

        /* LUXURY ANIMATIONS */
        .press-effect { transition: transform 0.15s cubic-bezier(0.2, 0, 0.2, 1); }
        .press-effect:active { transform: scale(0.9) !important; filter: brightness(1.5); }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: 30px; 
            padding: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* INPUTS */
        input { 
            width: 100%; padding: 18px; border-radius: 18px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: #fff; font-size: 16px; margin-bottom: 12px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .btn { 
            padding: 18px; border-radius: 18px; border: none; font-weight: 700; 
            cursor: pointer; text-align: center; display: block; width: 100%;
        }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
        .btn-sub { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }

        /* LOBBY */
        .host-code-wrap { text-align: center; margin: 20px 0; }
        .host-code { 
            font-size: 48px; font-weight: 900; color: var(--accent); 
            letter-spacing: 8px; text-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
        }
        .player-row { 
            display: flex; align-items: center; gap: 12px; padding: 15px; 
            background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 8px;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* GAME BOARD */
        .board { display: grid; gap: 6px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 20px; width: 100%; }
        .cell { 
            aspect-ratio: 1/1; background: #111; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; font-weight: 900; position: relative;
            transition: 0.2s;
        }
        .cell.occupied { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .cell.coin { border-radius: 50%; }
        .cell.p1 { color: var(--p1); } .cell.p2 { color: var(--p2); } .cell.p3 { color: var(--p3); }
        .cell.coin.p1 { background: var(--p1); box-shadow: 0 0 15px var(--p1); }
        .cell.coin.p2 { background: var(--p2); box-shadow: 0 0 15px var(--p2); }
        .cell.coin.p3 { background: var(--p3); box-shadow: 0 0 15px var(--p3); }

        /* INTERFACE STATES */
        .hidden { display: none !important; }
        .status-msg { text-align: center; color: var(--accent); font-weight: 700; height: 30px; margin: 15px 0; }

        /* ADMIN */
        .adm-fab { position: absolute; bottom: 30px; right: 30px; width: 45px; height: 45px; border-radius: 50%; background: var(--p1); display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

<div class="app">
    <div id="view-auth" class="glass-card" style="margin-top: auto; margin-bottom: auto;">
        <h2 style="text-align:center; margin-bottom: 25px; letter-spacing: -1px;">FluxOS <span style="color:var(--accent)">ONLINE</span></h2>
        <input type="text" id="nick-name" placeholder="Твой никнейм" maxlength="10">
        <button class="btn btn-main press-effect" onclick="Core.initHost()">СОЗДАТЬ ИГРУ</button>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <input type="number" id="join-code" placeholder="Код хоста" style="margin-bottom:0; flex: 2;">
            <button class="btn btn-sub press-effect" style="flex: 1.2;" onclick="Core.initJoin()">ВХОД</button>
        </div>
    </div>

    <div id="view-lobby" class="hidden glass-card">
        <div class="host-code-wrap">
            <p style="font-size: 10px; opacity: 0.5;">КОД ПОДКЛЮЧЕНИЯ</p>
            <div class="host-code" id="display-id">------</div>
        </div>
        
        <div id="player-list" style="min-height: 100px;"></div>

        <div id="host-ui" class="hidden" style="margin-top: 20px;">
            <p style="font-size: 10px; margin-bottom: 10px;">РЕЖИМ:</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <button class="btn btn-sub press-effect" id="m-ttt" onclick="Core.setMode('ttt')">3X3</button>
                <button class="btn btn-sub press-effect" id="m-c4" onclick="Core.setMode('c4')">7X6</button>
                <button class="btn btn-sub press-effect" id="m-rps" onclick="Core.setMode('rps')">КНБ</button>
            </div>
            <button class="btn btn-main press-effect" onclick="Net.forceStart()">ЗАПУСТИТЬ</button>
        </div>
        
        <div id="guest-ui" class="hidden" style="text-align: center; padding: 20px;">
            <p class="status-msg">Ждем команду хоста...</p>
        </div>
    </div>

    <div id="view-game" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div id="p-0" class="player-row" style="flex:1; margin-bottom:0; padding: 10px;"><b>P1</b>: <span id="s-0">0</span></div>
            <div id="p-1" class="player-row" style="flex:1; margin-bottom:0; padding: 10px;"><b>P2</b>: <span id="s-1">0</span></div>
            <div id="p-2" class="player-row hidden" style="flex:1; margin-bottom:0; padding: 10px;"><b>P3</b>: <span id="s-2">0</span></div>
        </div>

        <div class="status-msg" id="game-info">СИНХРОНИЗАЦИЯ...</div>

        <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <div id="board" class="board"></div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn btn-sub press-effect" onclick="location.reload()">МЕНЮ</button>
            <button id="btn-restart" class="btn btn-main press-effect hidden" onclick="Net.forceStart()">ЕЩЁ РАЗ</button>
        </div>
    </div>

    <div id="adm" class="adm-fab hidden press-effect" onclick="Net.admWin()">⚡</div>
</div>

<script>
    /**
     * NETWORK CORE (FIXED HANDSHAKE)
     */
    const Net = {
        peer: null, conns: [], conn: null, mode: 'HOST', players: [], myIdx: 0,
        
        setup(id) {
            return new Promise((res) => {
                // Прямой ID без скрытых префиксов
                this.peer = new Peer(id);
                this.peer.on('open', res);
                this.peer.on('connection', c => this.handleConn(c));
                this.peer.on('error', e => { alert("ID занят или ошибка сети!"); location.reload(); });
            });
        },

        handleConn(c) {
            this.conns.push(c);
            c.on('data', d => this.onData(d, c));
            // Мгновенное подтверждение для клиента
            c.on('open', () => c.send({type: 'ACK'}));
        },

        onData(d, c) {
            if(this.mode === 'HOST') {
                if(d.type === 'JOIN') {
                    this.players.push({name: d.name, idx: this.players.length});
                    this.broadcast({type: 'SYNC', p: this.players});
                    Core.updLobby();
                }
                if(d.type === 'MOVE') Game.process(d.idx, d.p);
            } else {
                if(d.type === 'SYNC') {
                    this.players = d.p;
                    this.myIdx = this.players.findIndex(x => x.name === Core.uName);
                    Core.updLobby();
                }
                if(d.type === 'START') {
                    Core.gMode = d.m; Game.state = d.s;
                    Core.switch('view-game'); Game.draw();
                }
                if(d.type === 'UP') { Game.state = d.s; Game.draw(); }
            }
        },

        broadcast(data) { this.conns.forEach(c => c.send(data)); },
        
        forceStart() {
            Game.init();
            this.broadcast({type: 'START', m: Core.gMode, s: Game.state});
            Core.switch('view-game'); Game.draw();
        },

        admWin() { if(this.mode === 'HOST') Game.win(this.myIdx); }
    };

    /**
     * GAME LOGIC (FLUXOS ENGINE)
     */
    const Game = {
        state: { grid: [], turn: 0, scores: [0,0,0], active: false, msg: '' },

        init() {
            const cnt = Net.players.length;
            this.state.active = true; this.state.turn = 0; this.state.msg = '';
            let sz = Core.gMode === 'c4' ? 42 : (cnt === 3 ? 36 : 9);
            this.state.grid = Array(sz).fill(null);
        },

        process(idx, p) {
            if(!this.state.active || this.state.turn !== p) return;
            let ok = false;
            if(Core.gMode === 'c4') {
                let col = idx % 7;
                for(let r=5; r>=0; r--) {
                    if(this.state.grid[r*7+col] === null) {
                        this.state.grid[r*7+col] = p; ok = true; break;
                    }
                }
            } else {
                if(this.state.grid[idx] === null) { this.state.grid[idx] = p; ok = true; }
            }

            if(ok) {
                if(this.check(p)) this.win(p);
                else this.state.turn = (this.state.turn + 1) % Net.players.length;
                Net.broadcast({type: 'UP', s: this.state});
                this.draw();
            }
        },

        win(p) {
            this.state.active = false; this.state.scores[p]++;
            this.state.msg = `WINNER: ${Net.players[p].name}`;
        },

        check(p) {
            const g = this.state.grid;
            const sz = Core.gMode === 'c4' ? 7 : Math.sqrt(g.length);
            const win = Core.gMode === 'c4' ? 4 : (Net.players.length === 3 ? 4 : 3);
            for(let i=0; i<g.length; i++) {
                if(g[i] !== p) continue;
                for(let [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                    let c = 1;
                    for(let s=1; s<win; s++) {
                        let r = Math.floor(i/sz)+dr*s, col = (i%sz)+dc*s;
                        if(r>=0 && r<(g.length/sz) && col>=0 && col<sz && g[r*sz+col] === p) c++; else break;
                    }
                    if(c === win) return true;
                }
            }
            return false;
        },

        draw() {
            const b = document.getElementById('board');
            const cols = Core.gMode === 'c4' ? 7 : Math.sqrt(this.state.grid.length);
            b.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            b.innerHTML = '';

            this.state.grid.forEach((v, i) => {
                const c = document.createElement('div');
                c.className = `cell press-effect ${Core.gMode === 'c4' ? 'coin' : ''}`;
                if(v !== null) {
                    c.classList.add('p' + (v+1), 'occupied');
                    if(Core.gMode !== 'c4') c.innerText = v === 0 ? 'X' : (v === 1 ? 'O' : '∆');
                }
                c.onclick = () => {
                    if(Net.mode === 'HOST') this.process(i, Net.myIdx);
                    else Net.conn.send({type: 'MOVE', idx: i, p: Net.myIdx});
                };
                b.appendChild(c);
            });

            document.getElementById('game-info').innerText = this.state.msg || (this.state.turn === Net.myIdx ? "ТВОЙ ХОД" : `ХОД: ${Net.players[this.state.turn]?.name}`);
            Net.players.forEach((p, i) => {
                document.getElementById('s-'+i).innerText = this.state.scores[i];
                document.getElementById('p-'+i).classList.toggle('active', this.state.turn === i && this.state.active);
            });
            document.getElementById('btn-restart').classList.toggle('hidden', this.state.active || Net.mode !== 'HOST');
        }
    };

    /**
     * APP CORE
     */
    const Core = {
        uName: '', gMode: 'ttt',
        async initHost() {
            this.uName = document.getElementById('nick-name').value || 'Host';
            const id = Math.floor(100000 + Math.random()*900000).toString();
            await Net.setup(id);
            document.getElementById('display-id').innerText = id;
            Net.players = [{name: this.uName, idx: 0}];
            this.switch('view-lobby');
            document.getElementById('host-ui').classList.remove('hidden');
            this.updLobby();
            if(this.uName === 'An6not') document.getElementById('adm').classList.remove('hidden');
        },
        async initJoin() {
            const code = document.getElementById('join-code').value;
            if(!code) return;
            this.uName = document.getElementById('nick-name').value || 'Guest';
            Net.mode = 'GUEST';
            await Net.setup((Math.random()*1000).toFixed(0));
            Net.conn = Net.peer.connect(code);
            Net.conn.on('open', () => {
                Net.conn.send({type: 'JOIN', name: this.uName});
                this.switch('view-lobby');
                document.getElementById('guest-ui').classList.remove('hidden');
            });
        },
        setMode(m) {
            this.gMode = m;
            document.querySelectorAll('#host-ui .btn').forEach(b => b.classList.remove('btn-main'));
            document.getElementById('m-'+m).classList.add('btn-main');
        },
        updLobby() {
            document.getElementById('player-list').innerHTML = Net.players.map(p => `
                <div class="player-row" style="border:1px solid ${p.name === this.uName ? 'var(--accent)' : 'transparent'}">
                    <div style="width:10px; height:10px; border-radius:50%; background:var(--p${p.idx+1})"></div>
                    <b>${p.name}</b>
                </div>
            `).join('');
        },
        switch(id) {
            document.querySelectorAll('.app > div').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    };
</script>
</body>
</html>
