<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic Test: Human or AI</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --danger: #f85149;
            --secret: #238636;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
        }

        .hidden { display: none !important; }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: var(--accent);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        /* Чат */
        #chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #30363d;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            padding: 8px 12px;
            margin: 4px;
            border-radius: 8px;
            max-width: 80%;
        }

        .msg.sent { background: var(--accent); align-self: flex-end; color: white; }
        .msg.received { background: #30363d; align-self: flex-start; }

        /* Чит-меню */
        #cheat-menu {
            background: #1c2128;
            border: 1px dashed var(--secret);
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .online { background-color: var(--secret); }

        /* Анимация поиска */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="auth-screen">
        <h2>Вход в систему</h2>
        <input type="text" id="username" placeholder="Введите ваш ник...">
        <button onclick="checkUser()">Войти</button>
    </div>

    <div class="container hidden" id="host-setup">
        <h2 style="color: var(--secret)">Host Panel: annot</h2>
        <p>Создайте пятизначный код для друга:</p>
        <input type="text" id="host-code" maxlength="5" placeholder="Пример: 55432">
        <button onclick="startHost()">Запустить лобби</button>
    </div>

    <div class="container hidden" id="guest-setup">
        <h2>Подключение</h2>
        <input type="text" id="join-code" maxlength="5" placeholder="Введите 5-значный код...">
        <button onclick="joinLobby()">Подключиться к сессии</button>
    </div>

    <div class="container hidden" id="searching-screen">
        <h2>Поиск противника...</h2>
        <div class="loader"></div>
        <p id="search-status">Ожидание подключения хоста...</p>
    </div>

    <div class="container hidden" id="game-screen">
        <div id="chat-header">
            <span class="status-dot online"></span>
            <span id="opponent-name">Собеседник</span>
        </div>
        <hr>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Напишите сообщение...">
        <button onclick="sendMessage()">Отправить</button>

        <div id="cheat-menu" class="hidden">
            <small style="color: var(--secret)">CHIT MENU ACTIVATED</small>
            <div style="display:flex; gap: 5px; margin-top: 5px;">
                <button style="background: #21262d; font-size: 10px;" onclick="toggleAI(true)">РЕЖИМ: ИИ</button>
                <button style="background: #21262d; font-size: 10px;" onclick="toggleAI(false)">РЕЖИМ: ИГРОК</button>
            </div>
            <p id="mode-status" style="font-size: 10px; margin: 5px 0;">Текущий статус: Игрок</p>
        </div>
    </div>

    <script>
        let currentUser = "";
        let isAnnot = false;
        let sessionCode = "";
        let isAIMode = false;

        function checkUser() {
            currentUser = document.getElementById('username').value.trim();
            if (currentUser === "") return;

            if (currentUser.toLowerCase() === "annot") {
                isAnnot = true;
                showScreen('host-setup');
            } else {
                showScreen('guest-setup');
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startHost() {
            sessionCode = document.getElementById('host-code').value;
            if (sessionCode.length !== 5) {
                alert("Код должен быть 5-значным!");
                return;
            }
            // Сохраняем код в localStorage для эмуляции "сервера" на одном браузере
            localStorage.setItem('active_session', sessionCode);
            localStorage.setItem('host_name', currentUser);
            
            document.getElementById('cheat-menu').classList.remove('hidden');
            showScreen('game-screen');
            addSystemMessage("Лобби создано. Ждем игрока...");
        }

        function joinLobby() {
            const enteredCode = document.getElementById('join-code').value;
            const savedCode = localStorage.getItem('active_session');

            showScreen('searching-screen');

            // Имитация поиска
            setTimeout(() => {
                if (enteredCode === savedCode) {
                    document.getElementById('opponent-name').innerText = localStorage.getItem('host_name');
                    showScreen('game-screen');
                    addSystemMessage("Соединение установлено!");
                } else {
                    alert("Код не найден или сессия не существует");
                    showScreen('guest-setup');
                }
            }, 2000);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (text === "") return;

            addMessage(text, 'sent');
            input.value = "";

            // Если пишет друг (не annot), то сообщение "улетает" к annot
            // Здесь логика для теста на одном экране:
            if (!isAnnot) {
                console.log("Сообщение для хоста:", text);
            }
        }

        function addMessage(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function addSystemMessage(text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.style.fontSize = "10px";
            div.style.textAlign = "center";
            div.style.color = "#8b949e";
            div.style.margin = "10px 0";
            div.innerText = text;
            box.appendChild(div);
        }

        function toggleAI(val) {
            isAIMode = val;
            document.getElementById('mode-status').innerText = "Текущий статус: " + (isAIMode ? "Искусственный Интеллект" : "Игрок");
            document.getElementById('mode-status').style.color = isAIMode ? "var(--danger)" : "var(--secret)";
        }

        // Обработка Enter
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
