<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FluxOS P2P Authoritative Engine</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --p1: #f43f5e; --p2: #10b981; --p3: #f59e0b;
            --text: #f1f5f9;
            --radius: 22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', system-ui; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .viewport { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: var(--radius); }

        /* Login Screen */
        .login-box { padding: 30px; text-align: center; margin-top: 40px; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 25px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { width: 100%; padding: 16px; border-radius: 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: #fff; text-align: center; font-size: 16px; margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--accent); color: var(--bg); }
        .btn-primary:active { transform: scale(0.97); }

        /* Lobby Info */
        .player-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 4px; background: var(--glass); border: 1px solid var(--glass-border); }
        .player-tag.active { border-color: var(--accent); color: var(--accent); }

        /* Game UI */
        .score-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .score-box { flex: 1; padding: 12px; border-radius: 15px; text-align: center; font-size: 11px; position: relative; }
        .score-box b { display: block; font-size: 18px; margin-top: 4px; }
        .score-box.turn-active::after { content: ''; position: absolute; bottom: -5px; left: 20%; right: 20%; height: 3px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 10px var(--accent); }

        .board { display: grid; gap: 6px; margin: 0 auto; width: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cell { aspect-ratio: 1/1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
        .cell.p1 { color: var(--p1); text-shadow: 0 0 15px var(--p1); }
        .cell.p2 { color: var(--p2); text-shadow: 0 0 15px var(--p2); }
        .cell.p3 { color: var(--p3); text-shadow: 0 0 15px var(--p3); }
        
        /* Connect 4 Cells */
        .cell.coin { border-radius: 50%; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .cell.coin.p1 { background: var(--p1); border: 3px solid rgba(255,255,255,0.1); }
        .cell.coin.p2 { background: var(--p2); border: 3px solid rgba(255,255,255,0.1); }
        .cell.coin.p3 { background: var(--p3); border: 3px solid rgba(255,255,255,0.1); }
        .cell.fading { opacity: 0.4; filter: blur(1px); }

        /* Admin Panel */
        #admin-panel { margin-top: 15px; padding: 15px; background: rgba(244, 63, 94, 0.1); border: 1px dashed var(--p1); border-radius: 15px; }
        .admin-title { font-size: 10px; font-weight: 800; color: var(--p1); text-transform: uppercase; margin-bottom: 10px; }

        .status-bar { padding: 12px; text-align: center; font-weight: 700; font-size: 14px; margin-bottom: 15px; }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="viewport">
    <div id="scr-login" class="login-box glass fade-in">
        <h1>FluxOS P2P</h1>
        <input type="text" id="user-name" placeholder="ВАШЕ ИМЯ" maxlength="12">
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <button class="btn glass" onclick="App.initHost()" style="flex: 1;">СОЗДАТЬ</button>
            <button class="btn btn-primary" onclick="App.showJoin()" style="flex: 1;">ВОЙТИ</button>
        </div>
        
        <div id="join-controls" class="hidden">
            <input type="number" id="host-id" placeholder="ID ХОСТА" inputmode="numeric">
            <button class="btn btn-primary" onclick="App.initClient()">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <div id="scr-lobby" class="hidden fade-in">
        <div class="glass" style="padding: 25px; text-align: center;">
            <p style="color: #64748b; font-size: 12px; margin-bottom: 10px;">ID КОМНАТЫ</p>
            <h2 id="display-id" style="font-size: 36px; letter-spacing: 5px; color: var(--accent);">------</h2>
            <div id="player-list" style="margin: 20px 0;"></div>
            
            <div id="host-settings" class="hidden">
                <p style="font-size: 11px; margin-bottom: 10px;">ВЫБЕРИТЕ РЕЖИМ (2-3 ИГРОКА)</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                    <button class="btn glass active" id="m-ttt" onclick="App.setMode('ttt')">Крестики</button>
                    <button class="btn glass" id="m-ghost" onclick="App.setMode('ghost')">Призрак</button>
                    <button class="btn glass" id="m-c4" onclick="App.setMode('c4')">Connect 4</button>
                    <button class="btn glass" id="m-rps" onclick="App.setMode('rps')">К.Н.Б.</button>
                </div>
                <button class="btn btn-primary" onclick="Net.hostStart()">ЗАПУСТИТЬ ИГРУ</button>
            </div>
            <p id="client-wait" class="hidden" style="color: var(--accent); font-style: italic;">Ждем старта от хоста...</p>
        </div>
    </div>

    <div id="scr-game" class="hidden fade-in">
        <div class="score-row">
            <div id="sb-0" class="score-box glass">P1: <span id="n-0">...</span><b id="s-0">0</b></div>
            <div id="sb-1" class="score-box glass">P2: <span id="n-1">...</span><b id="s-1">0</b></div>
            <div id="sb-2" class="score-box glass hidden">P3: <span id="n-2">...</span><b id="s-2">0</b></div>
        </div>

        <div id="status" class="status-bar glass">Синхронизация...</div>

        <div id="arena" style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <div id="board" class="board"></div>
        </div>

        <div id="admin-panel" class="hidden">
            <div class="admin-title">Admin Console</div>
            <div style="display: flex; gap: 5px;">
                <button class="btn glass" style="font-size: 10px; padding: 8px;" onclick="Net.adminAction('forceWin')">WIN</button>
                <button class="btn glass" style="font-size: 10px; padding: 8px;" onclick="Net.adminAction('reset')">RESET</button>
                <button class="btn glass" style="font-size: 10px; padding: 8px;" onclick="location.reload()">KILL</button>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn glass" onclick="location.reload()" style="flex: 1;">ВЫХОД</button>
            <button id="btn-restart" class="btn btn-primary hidden" onclick="Net.hostRestart()" style="flex: 2;">ЗАНОВО</button>
        </div>
    </div>
</div>

<script>
    /**
     * AUTHORITATIVE NETWORK ENGINE
     */
    const Net = {
        peer: null,
        conns: [], // Only for Host
        conn: null, // Only for Client
        role: 'HOST',
        myIdx: 0,
        players: [],
        isAdmin: false,

        init(isHost) {
            this.role = isHost ? 'HOST' : 'GUEST';
            const id = Math.floor(100000 + Math.random() * 900000).toString();
            this.peer = new Peer('fluxos-' + id);
            
            this.peer.on('open', () => {
                if(isHost) {
                    document.getElementById('display-id').innerText = id;
                    this.players.push({ name: App.userName, id: id, idx: 0 });
                    this.updateLobby();
                }
            });

            this.peer.on('connection', c => {
                if(this.players.length >= 3) return c.close();
                this.conns.push(c);
                this.bindEvents(c);
            });
        },

        connect(targetId) {
            this.conn = this.peer.connect('fluxos-' + targetId);
            this.bindEvents(this.conn);
        },

        bindEvents(c) {
            c.on('open', () => {
                if(this.role === 'GUEST') {
                    c.send({ type: 'JOIN_REQ', name: App.userName });
                }
            });

            c.on('data', data => this.handleData(data, c));
            c.on('close', () => location.reload());
        },

        handleData(data, c) {
            // HOST LOGIC
            if(this.role === 'HOST') {
                switch(data.type) {
                    case 'JOIN_REQ':
                        const newIdx = this.players.length;
                        this.players.push({ name: data.name, idx: newIdx });
                        this.updateLobby();
                        this.broadcast({ type: 'LOBBY_SYNC', players: this.players });
                        break;
                    case 'MOVE_REQ':
                        Engine.validateAndApply(data.idx, data.pIdx);
                        break;
                    case 'ADMIN_ACT':
                        this.processAdmin(data.action);
                        break;
                }
            } 
            // CLIENT LOGIC
            else {
                switch(data.type) {
                    case 'LOBBY_SYNC':
                        this.players = data.players;
                        this.myIdx = this.players.findIndex(p => p.name === App.userName);
                        this.updateLobby();
                        break;
                    case 'GAME_START':
                        App.mode = data.mode;
                        App.showGameUI();
                        Engine.sync(data.state);
                        break;
                    case 'STATE_UPDATE':
                        Engine.sync(data.state);
                        break;
                }
            }
        },

        broadcast(data) {
            this.conns.forEach(c => c.send(data));
        },

        updateLobby() {
            const list = document.getElementById('player-list');
            list.innerHTML = this.players.map(p => `<span class="player-tag ${p.idx === this.myIdx ? 'active' : ''}">${p.name}</span>`).join('');
            if(this.role === 'HOST') {
                document.getElementById('host-settings').classList.remove('hidden');
            } else {
                document.getElementById('client-wait').classList.remove('hidden');
            }
        },

        hostStart() {
            Engine.init(this.players.length);
            this.broadcast({ type: 'GAME_START', mode: App.mode, state: Engine.getState() });
            App.showGameUI();
        },

        hostRestart() {
            Engine.init(this.players.length);
            this.broadcast({ type: 'STATE_UPDATE', state: Engine.getState() });
            document.getElementById('btn-restart').classList.add('hidden');
        },

        adminAction(act) {
            const pkt = { type: 'ADMIN_ACT', action: act };
            this.role === 'HOST' ? this.processAdmin(act) : this.conn.send(pkt);
        },

        processAdmin(act) {
            if(act === 'forceWin') {
                Engine.win(Engine.state.turn);
            } else if(act === 'reset') {
                this.hostRestart();
            }
        }
    };

    /**
     * CENTRAL GAME ENGINE (AUTHORITATIVE)
     */
    const Engine = {
        state: {
            grid: [],
            turn: 0,
            active: false,
            scores: [0, 0, 0],
            limit: 2,
            winner: null
        },

        init(playerCount) {
            this.state.limit = playerCount;
            this.state.active = true;
            this.state.turn = 0;
            this.state.winner = null;
            
            let size = 0;
            if(App.mode === 'ttt' || App.mode === 'ghost') size = (playerCount === 3 ? 36 : 9);
            else if(App.mode === 'c4') size = 42;
            else if(App.mode === 'mem') size = 16;
            else size = 1;

            this.state.grid = Array(size).fill(null);
            
            if(App.mode === 'mem') {
                const em = ['🔥','💎','🌀','💀','⚡','🍀','🍎','🍄'];
                this.state.deck = [...em, ...em].sort(() => Math.random() - 0.5);
            }
            if(App.mode === 'ghost') this.state.queues = [[], [], []];

            this.sync(this.state);
        },

        validateAndApply(cellIdx, pIdx) {
            if(!this.state.active || this.state.turn !== pIdx) return;

            const mode = App.mode;
            let moveValid = false;

            if(mode === 'ttt' || mode === 'ghost') {
                if(this.state.grid[cellIdx] === null) {
                    if(mode === 'ghost') {
                        this.state.queues[pIdx].push(cellIdx);
                        if(this.state.queues[pIdx].length > 3) {
                            const old = this.state.queues[pIdx].shift();
                            this.state.grid[old] = null;
                        }
                    }
                    this.state.grid[cellIdx] = pIdx;
                    moveValid = true;
                }
            } else if(mode === 'c4') {
                let col = cellIdx % 7;
                for(let r=5; r>=0; r--) {
                    if(this.state.grid[r*7+col] === null) {
                        this.state.grid[r*7+col] = pIdx;
                        moveValid = true;
                        break;
                    }
                }
            } else if(mode === 'rps') {
                this.state.grid[pIdx] = cellIdx; // cellIdx is R, P, or S
                if(!this.state.grid.slice(0, this.state.limit).includes(null)) {
                    this.win(-1, "РЕЗУЛЬТАТ: " + this.state.grid.slice(0, this.state.limit).join(' vs '));
                    return;
                }
                this.state.turn = (this.state.turn + 1) % this.state.limit;
                Net.broadcast({ type: 'STATE_UPDATE', state: this.state });
                this.sync(this.state);
                return;
            }

            if(moveValid) {
                if(this.checkWin(pIdx)) {
                    this.win(pIdx);
                } else {
                    this.state.turn = (this.state.turn + 1) % this.state.limit;
                    Net.broadcast({ type: 'STATE_UPDATE', state: this.state });
                    this.sync(this.state);
                }
            }
        },

        checkWin(p) {
            const g = this.state.grid;
            const size = Math.sqrt(g.length);
            const target = (this.state.limit === 3 ? 4 : 3);

            if(App.mode === 'c4') {
                // Connect 4 Logic (7x6)
                for(let i=0; i<42; i++) {
                    if(g[i] !== p) continue;
                    for(let [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                        let count = 1;
                        for(let step=1; step<4; step++) {
                            let r = Math.floor(i/7) + dr*step, c = (i%7) + dc*step;
                            if(r>=0 && r<6 && c>=0 && c<7 && g[r*7+c] === p) count++; else break;
                        }
                        if(count === 4) return true;
                    }
                }
            } else {
                // TTT Logic
                const s = size;
                for(let i=0; i<g.length; i++) {
                    if(g[i] !== p) continue;
                    for(let [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                        let count = 1;
                        for(let step=1; step<target; step++) {
                            let r = Math.floor(i/s) + dr*step, c = (i%s) + dc*step;
                            if(r>=0 && r<s && c>=0 && c<s && g[r*s+c] === p) count++; else break;
                        }
                        if(count === target) return true;
                    }
                }
            }
            return false;
        },

        win(p, customMsg) {
            this.state.active = false;
            if(p !== -1) this.state.scores[p]++;
            const msg = customMsg || `ИГРОК ${p+1} (${Net.players[p].name}) ПОБЕДИЛ!`;
            this.state.winner = msg;
            Net.broadcast({ type: 'STATE_UPDATE', state: this.state });
            this.sync(this.state);
        },

        sync(newState) {
            this.state = newState;
            
            // Update UI Scores
            for(let i=0; i<3; i++) {
                const box = document.getElementById('sb-' + i);
                if(i < this.state.limit) {
                    box.classList.remove('hidden');
                    document.getElementById('n-' + i).innerText = Net.players[i]?.name || '...';
                    document.getElementById('s-' + i).innerText = this.state.scores[i];
                    box.classList.toggle('turn-active', this.state.turn === i && this.state.active);
                } else box.classList.add('hidden');
            }

            // Render Board
            const b = document.getElementById('board');
            const mode = App.mode;
            
            if(mode === 'rps') {
                b.style.gridTemplateColumns = 'repeat(3, 1fr)';
                b.innerHTML = ['🪨','📄','✂️'].map(v => `<div class="cell glass" onclick="App.cellClick('${v}')">${v}</div>`).join('');
            } else {
                const cols = (mode === 'c4' ? 7 : Math.sqrt(this.state.grid.length));
                b.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                b.innerHTML = '';
                this.state.grid.forEach((v, i) => {
                    const c = document.createElement('div');
                    c.className = `cell glass ${mode === 'c4' ? 'coin' : ''}`;
                    if(v !== null) {
                        c.classList.add('p' + (v+1));
                        c.innerText = (mode === 'c4' ? '' : ['X', 'O', '▲'][v]);
                    }
                    if(mode === 'ghost' && this.state.queues[v]?.length === 3 && this.state.queues[v][0] === i) {
                        c.classList.add('fading');
                    }
                    c.onclick = () => App.cellClick(i);
                    b.appendChild(c);
                });
            }

            // Status Text
            const st = document.getElementById('status');
            if(this.state.winner) {
                st.innerText = this.state.winner;
                st.style.color = 'var(--p2)';
                if(Net.role === 'HOST') document.getElementById('btn-restart').classList.remove('hidden');
            } else {
                const isMyTurn = (this.state.turn === Net.myIdx);
                st.innerText = isMyTurn ? "ВАШ ХОД!" : `ХОДИТ ${Net.players[this.state.turn]?.name}...`;
                st.style.color = isMyTurn ? 'var(--accent)' : '#fff';
            }
        },

        getState() { return this.state; }
    };

    /**
     * UI & APP CONTROLLER
     */
    const App = {
        userName: '',
        mode: 'ttt',

        showJoin() {
            document.getElementById('join-controls').classList.remove('hidden');
        },

        initHost() {
            this.userName = document.getElementById('user-name').value || 'Player 1';
            this.checkAdmin(this.userName);
            Net.init(true);
            document.getElementById('scr-login').classList.add('hidden');
            document.getElementById('scr-lobby').classList.remove('hidden');
        },

        initClient() {
            const tid = document.getElementById('host-id').value;
            if(!tid) return;
            this.userName = document.getElementById('user-name').value || 'Player ' + Math.floor(Math.random()*10);
            this.checkAdmin(this.userName);
            Net.init(false);
            Net.connect(tid);
            document.getElementById('scr-login').classList.add('hidden');
            document.getElementById('scr-lobby').classList.remove('hidden');
        },

        checkAdmin(name) {
            // Secret admin trigger
            if(name === 'An6not') {
                Net.isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        },

        setMode(m) {
            this.mode = m;
            document.querySelectorAll('#host-settings .btn').forEach(b => b.classList.remove('active'));
            document.getElementById('m-' + m).classList.add('active');
        },

        showGameUI() {
            document.getElementById('scr-lobby').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
        },

        cellClick(idx) {
            if(!Engine.state.active || Engine.state.turn !== Net.myIdx) return;
            const pkt = { type: 'MOVE_REQ', idx: idx, pIdx: Net.myIdx };
            if(Net.role === 'HOST') Engine.validateAndApply(idx, Net.myIdx);
            else Net.conn.send(pkt);
            if(navigator.vibrate) navigator.vibrate(15);
        }
    };
</script>
</body>
</html>
